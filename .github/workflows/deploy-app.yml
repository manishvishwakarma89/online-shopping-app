name: Deploy Node E-commerce App

on:
  workflow_dispatch:

jobs:
  
    deploy:
      env:
         DOCKERHUB_USER:  $ {{ vars.DOCKERHUB_USER }}
         DOCKER_TAG:      $ {{ github.head_sha }}

      runs-on: self-hosted
      steps:
           - name: Checkout code
             run:  actions/checkout@v4
          
           - name: deploy with docker compose
             run:  docker compose up -d --build 


